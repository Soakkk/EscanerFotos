name: Compilar ejecutable Windows

# Se ejecuta cuando:
#  - Subes un tag tipo v1.0, v2.0, etc.  -> genera un Release con el .exe
#  - Lo lanzas manualmente desde la pestaña Actions -> genera un artefacto descargable
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Ejecutar tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

      - name: Compilar (carpeta) con PyInstaller
        run: |
          pyinstaller --onedir --windowed --name "EscanerFotos" --clean `
            --collect-all cv2 `
            EscanerFotos/escaner_fotos.py

      - name: Construir instalador con Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $v = (Select-String -Path EscanerFotos/version.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          Write-Host "Versión detectada: $v"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$v instalador.iss

      - name: Calcular SHA-256 del instalador
        shell: pwsh
        run: |
          $exe = Get-ChildItem Output/EscanerFotos-Setup-*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -Encoding ascii "$($exe.FullName).sha256"
          Write-Host "SHA-256: $hash"

      - name: Subir instalador como artefacto (siempre)
        uses: actions/upload-artifact@v4
        with:
          name: EscanerFotos-Setup
          path: Output/EscanerFotos-Setup-*.exe*

      - name: Publicar Release con el instalador (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/EscanerFotos-Setup-*.exe*
          generate_release_notes: true
